<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roast My GitHub 🔥</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Space Mono', 'monospace'] },
          colors: {
            bg:        '#0F172A',
            card:      '#1E293B',
            card2:     '#334155',
            accent:    '#22C55E',
            accentHov: '#16A34A',
            danger:    '#EF4444',
            muted:     '#94A3B8',
            bright:    '#F8FAFC',
          },
          keyframes: {
            fadeUp:    { '0%': { opacity: 0, transform: 'translateY(16px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            pop:       { '0%': { transform: 'scale(0.8)', opacity: 0 }, '60%': { transform: 'scale(1.06)' }, '100%': { transform: 'scale(1)', opacity: 1 } },
            flicker:   { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.6 } },
            typewriter:{ from: { width: '0' }, to: { width: '100%' } },
            shimmer:   { '0%': { backgroundPosition: '-400px 0' }, '100%': { backgroundPosition: '400px 0' } },
            pulse2:    { '0%,100%': { opacity: 0.4 }, '50%': { opacity: 1 } },
            fireSway:  { '0%,100%': { transform: 'rotate(-3deg) scaleY(1)' }, '50%': { transform: 'rotate(3deg) scaleY(1.08)' } },
          },
          animation: {
            fadeUp:   'fadeUp 0.45s ease forwards',
            pop:      'pop 0.4s cubic-bezier(.34,1.56,.64,1) forwards',
            flicker:  'flicker 2s ease-in-out infinite',
            shimmer:  'shimmer 1.4s linear infinite',
            pulse2:   'pulse2 1.5s ease-in-out infinite',
            fireSway: 'fireSway 1.2s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <style>
    * { font-family: 'Space Mono', monospace; }
    body { background-color: #0F172A; color: #F8FAFC; min-height: 100vh; }

    /* Scanline overlay for depth */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; z-index: 0;
    }

    .shimmer-bg {
      background: linear-gradient(90deg, #1E293B 25%, #334155 50%, #1E293B 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s linear infinite;
    }

    /* Typewriter per-paragraph effect */
    .roast-text p { animation: fadeUp 0.5s ease forwards; opacity: 0; }
    .roast-text p:nth-child(1) { animation-delay: 0.05s; }
    .roast-text p:nth-child(2) { animation-delay: 0.25s; }
    .roast-text p:nth-child(3) { animation-delay: 0.45s; }
    .roast-text p:nth-child(4) { animation-delay: 0.65s; }
    .roast-text p:nth-child(5) { animation-delay: 0.85s; }
    .roast-text p:nth-child(6) { animation-delay: 1.05s; }

    /* Glow on accent */
    .accent-glow { box-shadow: 0 0 20px rgba(34,197,94,0.35), 0 0 40px rgba(34,197,94,0.15); }
    .accent-glow:hover { box-shadow: 0 0 30px rgba(34,197,94,0.55), 0 0 60px rgba(34,197,94,0.2); }

    /* Pill style buttons */
    .style-pill { transition: all 0.2s ease; border: 1.5px solid #334155; }
    .style-pill.active { border-color: #22C55E; background: rgba(34,197,94,0.12); color: #22C55E; }
    .style-pill:hover:not(.active) { border-color: #94A3B8; color: #F8FAFC; }

    /* Input focus glow */
    #username:focus { outline: none; box-shadow: 0 0 0 2px rgba(34,197,94,0.4); }

    /* Grid dots background pattern */
    .dot-pattern {
      background-image: radial-gradient(circle, #334155 1px, transparent 1px);
      background-size: 28px 28px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>

<body class="relative">

  <!-- Background grid -->
  <div class="fixed inset-0 dot-pattern opacity-30 pointer-events-none z-0"></div>

  <div class="relative z-10 min-h-screen flex flex-col">

    <!-- ── HERO HEADER ── -->
    <header class="pt-16 pb-8 px-4 text-center">
      <div class="flex items-center justify-center gap-3 mb-4">
        <!-- Flame logo SVG -->
        <svg class="w-10 h-10 animate-fireSway" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 6 8 6 13C6 16.314 8.686 19 12 19C15.314 19 18 16.314 18 13C18 8 12 2 12 2Z" fill="#22C55E" opacity="0.9"/>
          <path d="M12 6C12 6 8.5 10 8.5 13C8.5 14.933 10.067 16.5 12 16.5C13.933 16.5 15.5 14.933 15.5 13C15.5 10 12 6 12 6Z" fill="#86EFAC"/>
          <path d="M12 10C12 10 10.5 11.5 10.5 13C10.5 13.828 11.172 14.5 12 14.5C12.828 14.5 13.5 13.828 13.5 13C13.5 11.5 12 10 12 10Z" fill="#F8FAFC"/>
        </svg>
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-bright">
          Roast My <span class="text-accent">GitHub</span>
        </h1>
      </div>
      <p class="text-muted text-sm md:text-base max-w-md mx-auto leading-relaxed">
        Drop a username. Get publicly humiliated.<br/>
        <span class="text-accent/70">Powered by Claude AI — no mercy included.</span>
      </p>
    </header>

    <!-- ── MAIN CARD ── -->
    <main class="flex-1 flex flex-col items-center px-4 pb-16">
      <div class="w-full max-w-xl">

        <!-- Input card -->
        <div class="bg-card rounded-2xl p-6 md:p-8 border border-card2 shadow-2xl">

          <!-- Username input -->
          <div class="mb-6">
            <label for="username" class="block text-xs text-muted mb-2 uppercase tracking-widest">GitHub Username</label>
            <div class="flex gap-3">
              <div class="relative flex-1">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm select-none">@</span>
                <input
                  id="username"
                  type="text"
                  placeholder="torvalds"
                  autocomplete="off"
                  spellcheck="false"
                  class="w-full bg-bg border border-card2 rounded-xl pl-8 pr-4 py-3 text-bright text-sm placeholder-muted/50 transition-all duration-200"
                />
              </div>
              <button
                id="roastBtn"
                onclick="handleRoast()"
                class="accent-glow bg-accent hover:bg-accentHov text-bg font-bold px-5 py-3 rounded-xl text-sm transition-all duration-200 cursor-pointer whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed"
              >
                Roast 'em
              </button>
            </div>
          </div>

          <!-- Roast style selector -->
          <div>
            <p class="text-xs text-muted uppercase tracking-widest mb-3">Roast Style</p>
            <div class="flex flex-wrap gap-2" id="stylePills">
              <button class="style-pill active text-accent text-xs px-3 py-1.5 rounded-full cursor-pointer" data-style="savage">Savage</button>
              <button class="style-pill text-muted text-xs px-3 py-1.5 rounded-full cursor-pointer" data-style="pirate">Pirate</button>
              <button class="style-pill text-muted text-xs px-3 py-1.5 rounded-full cursor-pointer" data-style="corporate">Corporate</button>
              <button class="style-pill text-muted text-xs px-3 py-1.5 rounded-full cursor-pointer" data-style="haiku">Haiku</button>
              <button class="style-pill text-muted text-xs px-3 py-1.5 rounded-full cursor-pointer" data-style="shakespearean">Shakespeare</button>
            </div>
          </div>
        </div>

        <!-- ── RESULT AREA ── -->
        <div id="resultArea" class="mt-6 hidden">

          <!-- Skeleton loader -->
          <div id="skeleton" class="hidden bg-card rounded-2xl p-6 border border-card2">
            <div class="flex items-center gap-4 mb-6">
              <div class="w-16 h-16 rounded-full shimmer-bg flex-shrink-0"></div>
              <div class="flex-1 space-y-2">
                <div class="h-4 shimmer-bg rounded w-32"></div>
                <div class="h-3 shimmer-bg rounded w-20"></div>
              </div>
            </div>
            <div class="space-y-3">
              <div class="h-3 shimmer-bg rounded w-full"></div>
              <div class="h-3 shimmer-bg rounded w-5/6"></div>
              <div class="h-3 shimmer-bg rounded w-4/6"></div>
              <div class="h-3 shimmer-bg rounded w-full"></div>
              <div class="h-3 shimmer-bg rounded w-3/4"></div>
            </div>
          </div>

          <!-- Error state -->
          <div id="errorCard" class="hidden bg-card rounded-2xl p-6 border border-danger/40">
            <div class="flex items-start gap-3">
              <svg class="w-5 h-5 text-danger flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
              </svg>
              <p id="errorMsg" class="text-danger text-sm leading-relaxed"></p>
            </div>
          </div>

          <!-- Roast result card -->
          <div id="roastCard" class="hidden bg-card rounded-2xl border border-card2 overflow-hidden animation-fadeUp">

            <!-- User header -->
            <div class="p-6 border-b border-card2">
              <div class="flex items-center gap-4">
                <div class="relative">
                  <img id="avatar" src="" alt="GitHub avatar" class="w-16 h-16 rounded-full border-2 border-accent animation-pop object-cover" />
                  <!-- Flame badge -->
                  <div class="absolute -bottom-1 -right-1 bg-bg rounded-full p-0.5">
                    <svg class="w-5 h-5 animate-fireSway" viewBox="0 0 24 24" fill="none">
                      <path d="M12 2C12 2 7 8 7 13C7 15.761 9.239 18 12 18C14.761 18 17 15.761 17 13C17 8 12 2 12 2Z" fill="#22C55E"/>
                      <path d="M12 8C12 8 9.5 11 9.5 13C9.5 14.38 10.619 15.5 12 15.5C13.381 15.5 14.5 14.38 14.5 13C14.5 11 12 8 12 8Z" fill="#86EFAC"/>
                    </svg>
                  </div>
                </div>
                <div>
                  <div class="flex items-center gap-2 flex-wrap">
                    <h2 id="displayName" class="font-bold text-bright text-lg"></h2>
                    <span id="albanianBadge" class="hidden text-xs bg-accent/20 text-accent border border-accent/30 px-2 py-0.5 rounded-full">🇦🇱 Albanian Roast</span>
                  </div>
                  <p id="displayHandle" class="text-muted text-sm"></p>
                  <div class="flex gap-3 mt-1">
                    <span id="statsRepos" class="text-xs text-muted/70"></span>
                    <span id="statsFollowers" class="text-xs text-muted/70"></span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Style badge -->
            <div class="px-6 pt-4">
              <span id="styleBadge" class="text-xs bg-card2 text-muted px-3 py-1 rounded-full"></span>
            </div>

            <!-- Roast text -->
            <div class="p-6">
              <div id="roastContent" class="roast-text text-bright/90 text-sm leading-relaxed space-y-3"></div>
            </div>

            <!-- Actions -->
            <div class="px-6 pb-6 flex gap-3 flex-wrap">
              <button onclick="copyRoast()" class="flex items-center gap-2 text-xs text-muted border border-card2 hover:border-muted hover:text-bright px-4 py-2 rounded-xl transition-all duration-200 cursor-pointer">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                <span id="copyLabel">Copy Roast</span>
              </button>
              <button onclick="roastAnother()" class="flex items-center gap-2 text-xs text-accent border border-accent/30 hover:border-accent hover:bg-accent/10 px-4 py-2 rounded-xl transition-all duration-200 cursor-pointer">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Roast Another
              </button>
            </div>
          </div>

        </div>

        <!-- ── EXAMPLES ── -->
        <div id="examples" class="mt-8 text-center">
          <p class="text-xs text-muted/60 mb-3">Try a legend:</p>
          <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="tryExample('torvalds')" class="text-xs text-muted border border-card2 hover:border-muted hover:text-bright px-3 py-1.5 rounded-full transition-all duration-200 cursor-pointer">@torvalds</button>
            <button onclick="tryExample('gaearon')" class="text-xs text-muted border border-card2 hover:border-muted hover:text-bright px-3 py-1.5 rounded-full transition-all duration-200 cursor-pointer">@gaearon</button>
            <button onclick="tryExample('yyx990803')" class="text-xs text-muted border border-card2 hover:border-muted hover:text-bright px-3 py-1.5 rounded-full transition-all duration-200 cursor-pointer">@yyx990803</button>
          </div>
        </div>

      </div>
    </main>

    <!-- ── FOOTER ── -->
    <footer class="text-center pb-8 px-4">
      <p class="text-xs text-muted/40">
        Built with Claude AI &amp; too much sarcasm &nbsp;·&nbsp;
        <a href="https://github.com" class="hover:text-muted/70 transition-colors duration-200 cursor-pointer">GitHub API</a>
      </p>
    </footer>

  </div>

  <script>
    let selectedStyle = 'savage';
    let currentRoast = '';

    // Style pill selection
    document.querySelectorAll('.style-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.style-pill').forEach(p => {
          p.classList.remove('active', 'text-accent');
          p.classList.add('text-muted');
        });
        pill.classList.add('active', 'text-accent');
        pill.classList.remove('text-muted');
        selectedStyle = pill.dataset.style;
      });
    });

    // Enter key support
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRoast();
    });

    function tryExample(username) {
      document.getElementById('username').value = username;
      handleRoast();
    }

    function showSkeleton() {
      document.getElementById('resultArea').classList.remove('hidden');
      document.getElementById('skeleton').classList.remove('hidden');
      document.getElementById('errorCard').classList.add('hidden');
      document.getElementById('roastCard').classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('skeleton').classList.add('hidden');
      document.getElementById('errorCard').classList.remove('hidden');
      document.getElementById('roastCard').classList.add('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }

    function showRoast(data) {
      document.getElementById('skeleton').classList.add('hidden');
      document.getElementById('errorCard').classList.add('hidden');

      const card = document.getElementById('roastCard');
      card.classList.remove('hidden');
      card.classList.add('animation-fadeUp');

      // User info
      const avatar = document.getElementById('avatar');
      avatar.src = data.user.avatar_url;
      avatar.alt = `${data.user.login}'s GitHub avatar`;

      document.getElementById('displayName').textContent = data.user.name || data.user.login;
      document.getElementById('displayHandle').textContent = `@${data.user.login}`;
      document.getElementById('statsRepos').textContent = `${data.user.public_repos} repos`;
      document.getElementById('statsFollowers').textContent = `${data.user.followers} followers`;

      // Albanian badge
      if (data.albanian) {
        document.getElementById('albanianBadge').classList.remove('hidden');
      } else {
        document.getElementById('albanianBadge').classList.add('hidden');
      }

      // Style badge
      const styleLabels = { savage: 'Savage Roast', pirate: 'Pirate Mode', corporate: 'Corporate Feedback', haiku: 'Haiku Mode', shakespearean: 'Shakespearean' };
      document.getElementById('styleBadge').textContent = styleLabels[data.style] || data.style;

      // Render roast with paragraph animation
      currentRoast = data.roast;
      const content = document.getElementById('roastContent');
      content.innerHTML = '';
      const paragraphs = data.roast.split('\n').filter(p => p.trim());
      paragraphs.forEach(para => {
        const p = document.createElement('p');
        p.textContent = para;
        content.appendChild(p);
      });

      // Scroll into view
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function handleRoast() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        document.getElementById('username').focus();
        return;
      }

      const btn = document.getElementById('roastBtn');
      btn.disabled = true;
      btn.textContent = 'Roasting...';

      showSkeleton();

      try {
        const res = await fetch('/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, style: selectedStyle }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          showError(data.error || 'Something went wrong. Try again.');
        } else {
          showRoast(data);
        }
      } catch (err) {
        showError('Network error — check your connection and try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = "Roast 'em";
      }
    }

    async function copyRoast() {
      if (!currentRoast) return;
      try {
        await navigator.clipboard.writeText(currentRoast);
        const label = document.getElementById('copyLabel');
        label.textContent = 'Copied!';
        setTimeout(() => { label.textContent = 'Copy Roast'; }, 2000);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = currentRoast;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
    }

    function roastAnother() {
      document.getElementById('username').value = '';
      document.getElementById('resultArea').classList.add('hidden');
      document.getElementById('username').focus();
    }
  </script>
</body>
</html>
