<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roast My GitHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080810;
      --surface:  #0F0F1A;
      --card:     #13131F;
      --card-2:   #1A1A28;
      --border:   #252535;
      --border-2: #2E2E42;
      --fire:     #FF6B35;
      --ember:    #E8541C;
      --amber:    #FFA040;
      --bright:   #EFEFEF;
      --muted:    #888899;
      --subtle:   #444455;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-io:  cubic-bezier(0.77, 0, 0.175, 1);
      --spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--bright);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(80,80,140,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,80,140,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Atmospheric glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 1000px; height: 700px;
      background: radial-gradient(ellipse at 50% 15%,
        rgba(255,107,53,0.20) 0%,
        rgba(255,107,53,0.07) 38%,
        transparent 65%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.6s var(--ease-out);
    }

    /* ── Layout — two states ── */
    .layout {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Centering wrapper — grows to fill space, centers header+main */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      transition: justify-content 0s;
    }

    /* Once results show, anchor to top */
    .has-results .content-wrap {
      justify-content: flex-start;
    }

    .container {
      width: 100%;
      max-width: 640px;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      padding: 48px 0 36px;
      text-align: center;
      transition: padding 0.5s var(--ease-out);
    }

    .has-results header {
      padding: 36px 0 24px;
    }

    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 8vw, 4.4rem);
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--bright);
      margin-bottom: 16px;
      transition: font-size 0.5s var(--ease-out);
      text-wrap: balance;
    }

    .has-results .title {
      font-size: clamp(1.9rem, 4.5vw, 2.8rem);
    }

    .title-fire {
      color: var(--fire);
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.01em;
      line-height: 1.6;
      transition: opacity 0.4s var(--ease-out), max-height 0.4s var(--ease-out);
      overflow: hidden;
      max-height: 60px;
    }

    .has-results .subtitle {
      opacity: 0;
      max-height: 0;
    }

    .subtitle span {
      color: rgba(255,107,53,0.5);
    }

    /* ── Input card ── */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,107,53,0.22);
      border-radius: 18px;
      padding: 22px;
      box-shadow:
        0 0 0 1px rgba(255,107,53,0.04) inset,
        0 32px 72px rgba(0,0,0,0.55),
        0 8px 24px rgba(0,0,0,0.3);
      transition: box-shadow 0.3s var(--ease-out);
    }

    .input-card:focus-within {
      box-shadow:
        0 0 0 1px rgba(255,107,53,0.08) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 8px 32px rgba(0,0,0,0.35),
        0 0 60px rgba(255,107,53,0.06);
    }

    /* ── Label ── */
    .field-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,107,53,0.55);
      display: block;
      margin-bottom: 8px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-wrap {
      position: relative;
      flex: 1;
    }

    .input-at {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--subtle);
      pointer-events: none;
      user-select: none;
    }

    #username {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px 11px 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      color: var(--bright);
      transition:
        border-color 160ms var(--ease-out),
        box-shadow   160ms var(--ease-out);
    }

    #username::placeholder { color: var(--subtle); }

    #username:focus {
      outline: none;
      border-color: rgba(255,107,53,0.5);
      box-shadow:
        0 0 0 3px rgba(255,107,53,0.1),
        0 0 20px rgba(255,107,53,0.06);
    }

    /* ── CTA button ── */
    #roastBtn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--fire);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 11px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.01em;
      box-shadow:
        0 0 0 1px rgba(255,107,53,0.3),
        0 4px 18px rgba(255,107,53,0.45),
        0 0 40px rgba(255,107,53,0.18);
      transition:
        background-color 140ms var(--ease-out),
        box-shadow       140ms var(--ease-out),
        transform        120ms var(--spring);
    }

    #roastBtn:active:not(:disabled) { transform: scale(0.94); }
    #roastBtn:disabled {
      opacity: 0.45; cursor: not-allowed;
      box-shadow: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #roastBtn:hover:not(:disabled) {
        background: var(--ember);
        box-shadow:
          0 0 0 1px rgba(255,107,53,0.4),
          0 4px 28px rgba(255,107,53,0.55),
          0 0 60px rgba(255,107,53,0.22);
        transform: translateY(-1px);
      }
    }

    /* ── Style pills ── */
    .pills-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,107,53,0.55);
      margin-bottom: 10px;
    }

    .pills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition:
        border-color     130ms var(--ease-out),
        background-color 130ms var(--ease-out),
        color            130ms var(--ease-out),
        transform        120ms var(--spring),
        box-shadow       130ms var(--ease-out);
    }

    .pill:active { transform: scale(0.93); }

    .pill.active {
      background: var(--fire);
      border-color: var(--fire);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 14px rgba(255,107,53,0.4), 0 0 24px rgba(255,107,53,0.15);
    }

    @media (hover: hover) and (pointer: fine) {
      .pill:hover:not(.active) {
        border-color: rgba(255,107,53,0.35);
        color: var(--bright);
        background: rgba(255,255,255,0.05);
        transform: translateY(-1px);
      }
    }

    /* ── Result area ── */
    #resultArea {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #resultArea.hidden { display: none; }

    /* ── Skeleton ── */
    .shimmer {
      background: linear-gradient(90deg,
        var(--card) 25%,
        var(--card-2) 50%,
        var(--card) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s linear infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position:  600px 0; }
    }

    #skeleton {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    /* ── Error card ── */
    #errorCard {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: fadeUp 0.35s var(--ease-out) both;
    }

    /* ── Roast card ── */
    #roastCard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeUp 0.42s var(--ease-out) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Fire bar */
    .fire-bar {
      height: 2px;
      background: linear-gradient(90deg,
        var(--ember) 0%,
        var(--fire) 35%,
        var(--amber) 65%,
        transparent 100%);
    }

    /* Card header */
    .card-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    #avatar {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 2px solid var(--border-2);
      object-fit: cover;
      display: block;
      animation: popIn 0.38s var(--spring) both;
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.75); }
      70%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .fire-badge {
      position: absolute;
      bottom: -4px; right: -4px;
      width: 20px; height: 20px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: firePulse 2.4s ease-in-out infinite;
    }

    .card-meta { flex: 1; min-width: 0; }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--bright);
      letter-spacing: -0.01em;
      margin-bottom: 3px;
    }

    .card-handle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stats-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stat-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 9px;
      border-radius: 6px;
      background: rgba(255,107,53,0.07);
      border: 1px solid rgba(255,107,53,0.16);
      color: var(--amber);
      letter-spacing: 0.01em;
    }

    .style-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 5px 10px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--subtle);
      flex-shrink: 0;
    }

    /* Card divider */
    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px;
    }

    /* Roast text */
    .roast-body {
      padding: 20px;
    }

    #roastContent {
      font-size: 0.92rem;
      line-height: 1.78;
      color: rgba(239,239,239,0.88);
    }

    #roastContent p + p { margin-top: 14px; }
    #roastContent br { display: block; height: 6px; }

    /* Action bar */
    .action-bar {
      padding: 0 20px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      text-decoration: none;
      transition:
        border-color 130ms var(--ease-out),
        color        130ms var(--ease-out),
        background   130ms var(--ease-out),
        transform    120ms var(--spring);
    }

    .action-btn:active { transform: scale(0.94); }

    .action-btn.fire {
      color: var(--fire);
      border-color: rgba(255,107,53,0.3);
    }

    @media (hover: hover) and (pointer: fine) {
      .action-btn:hover:not(.fire) {
        border-color: var(--border-2);
        color: var(--bright);
        transform: translateY(-1px);
      }
      .action-btn.fire:hover {
        border-color: var(--fire);
        background: rgba(255,107,53,0.07);
        color: var(--fire);
        transform: translateY(-1px);
      }
    }

    /* ── Loading dots ── */
    .loading-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
    }

    .dots { display: flex; gap: 5px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--fire);
      animation: dotPulse 1.1s var(--ease-io) infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dotPulse {
      0%,100% { opacity: 0.2; transform: scale(0.7); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }

    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Examples ── */
    .examples {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 4px 0;
    }

    .examples-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0.7;
    }

    .examples-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .example-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.67rem;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-2);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition:
        border-color 130ms var(--ease-out),
        color        130ms var(--ease-out),
        background   130ms var(--ease-out),
        transform    120ms var(--spring);
    }

    .example-pill:active { transform: scale(0.93); }

    @media (hover: hover) and (pointer: fine) {
      .example-pill:hover {
        border-color: rgba(255,107,53,0.45);
        color: var(--fire);
        background: rgba(255,107,53,0.05);
        transform: translateY(-1px);
      }
    }

    /* ── Footer ── */
    footer {
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 640px;
      text-align: center;
      border-top: 1px solid rgba(37,37,53,0.7);
    }

    .has-results ~ footer,
    .layout.has-results footer {
      margin-top: 0;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: rgba(255,107,53,0.35);
      letter-spacing: 0.05em;
    }

    /* ── Utility ── */
    .hidden { display: none !important; }

    /* ── Page load entrance ── */
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fireIn {
      from { opacity: 0; transform: translateY(28px) scale(0.94); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes subtitleIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes examplesIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-title    { animation: heroIn     0.55s var(--ease-out) 0.05s both; }
    .hero-fire     { animation: fireIn     0.6s  var(--ease-out) 0.18s both; display: inline-block; }
    .hero-subtitle { animation: subtitleIn 0.5s  var(--ease-out) 0.28s both; }
    .input-card    { animation: cardIn     0.55s var(--ease-out) 0.35s both; }
    .examples      { animation: examplesIn 0.5s  var(--ease-out) 0.55s both; }

    /* Pill stagger on load */
    .pill { animation: cardIn 0.4s var(--ease-out) both; }
    .pill:nth-child(1) { animation-delay: 0.40s; }
    .pill:nth-child(2) { animation-delay: 0.45s; }
    .pill:nth-child(3) { animation-delay: 0.50s; }
    .pill:nth-child(4) { animation-delay: 0.55s; }
    .pill:nth-child(5) { animation-delay: 0.60s; }
    .pill:nth-child(6) { animation-delay: 0.65s; }

    /* Roast card staggered reveal */
    .card-header { animation: heroIn 0.4s var(--ease-out) 0.05s both; }
    .roast-body  { animation: heroIn 0.4s var(--ease-out) 0.15s both; }
    .action-bar  { animation: heroIn 0.4s var(--ease-out) 0.22s both; }

    /* ── Copy success ── */
    @keyframes copyPop {
      0%   { transform: scale(1); }
      35%  { transform: scale(0.91); }
      65%  { transform: scale(1.07); }
      100% { transform: scale(1); }
    }
    .copy-success { animation: copyPop 0.34s var(--spring); }

    /* ── Input shake on empty ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    .shake { animation: shake 0.38s var(--ease-out); }

    /* ── Fire badge pulse ── */
    @keyframes firePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
      50%     { box-shadow: 0 0 8px 3px rgba(255,107,53,0.38); }
    }

    /* ── Btn fire flicker on roasting ── */
    @keyframes btnFlicker {
      0%,100% { box-shadow: 0 0 0 1px rgba(255,107,53,0.3), 0 4px 18px rgba(255,107,53,0.45); }
      50%     { box-shadow: 0 0 0 1px rgba(255,107,53,0.5), 0 4px 28px rgba(255,107,53,0.7), 0 0 50px rgba(255,107,53,0.25); }
    }
    #roastBtn.roasting {
      animation: btnFlicker 1s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
<div class="layout" id="layout">

  <div class="content-wrap">
  <!-- HEADER -->
  <header class="container">
    <h1 class="title hero-title">Roast My <span class="title-fire hero-fire">GitHub</span></h1>
    <p class="subtitle hero-subtitle">
      Drop a username. Get publicly humiliated.<br>
      <span>// powered by Claude &middot; no mercy included</span>
    </p>
  </header>

  <!-- MAIN -->
  <main class="container" style="padding-bottom: 28px; display: flex; flex-direction: column; gap: 14px;">

    <!-- Input card -->
    <div class="input-card">

      <label class="field-label" for="username">GitHub Username</label>
      <div class="input-row">
        <div class="input-wrap">
          <span class="input-at">@</span>
          <input
            id="username"
            type="text"
            placeholder="torvalds"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button id="roastBtn" onclick="handleRoast()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.017 0C9.389 3.108 8.5 6.5 9.5 9.5c.5 1.5 1.5 2.5 1 4C8 12 6.5 9.5 6.5 9.5 5.5 14 7 17 9 19c-1.5-.5-2.5-1.5-3-3C4.5 20 7 23 12 24c5 0 8-3 8-7 0-2.5-1.5-4.5-3-5.5.5 2-1 3.5-2 4C16.5 13 15 9 12.017 0z"/>
          </svg>
          <span id="btnText">Roast 'em</span>
        </button>
      </div>

      <!-- Style pills -->
      <p class="pills-label">Roast Style</p>
      <div class="pills-grid" id="pillsGrid">
        <button class="pill active" data-style="savage">Savage</button>
        <button class="pill" data-style="pirate">Pirate</button>
        <button class="pill" data-style="corporate">Corporate</button>
        <button class="pill" data-style="haiku">Haiku</button>
        <button class="pill" data-style="shakespearean">Shakespeare</button>
        <button class="pill" data-style="albanian">Albanian</button>
      </div>
    </div>

    <!-- Result area -->
    <div id="resultArea" class="hidden">

      <!-- Skeleton -->
      <div id="skeleton" class="hidden">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
          <div class="shimmer" style="width:56px;height:56px;border-radius:14px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <div class="shimmer" style="height:16px;width:130px;"></div>
            <div class="shimmer" style="height:12px;width:90px;"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div class="shimmer" style="height:12px;width:100%;"></div>
          <div class="shimmer" style="height:12px;width:88%;"></div>
          <div class="shimmer" style="height:12px;width:76%;"></div>
          <div class="shimmer" style="height:12px;width:100%;"></div>
          <div class="shimmer" style="height:12px;width:82%;"></div>
        </div>
      </div>

      <!-- Error -->
      <div id="errorCard" class="hidden">
        <svg width="20" height="20" style="color:#F87171;flex-shrink:0;margin-top:1px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
        <p id="errorMsg" style="font-size:0.875rem;line-height:1.55;color:#F87171;"></p>
      </div>

      <!-- Roast card -->
      <div id="roastCard" class="hidden">
        <div class="fire-bar"></div>

        <div class="card-header">
          <div class="avatar-wrap">
            <img id="avatar" src="" alt="avatar" />
            <div class="fire-badge">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="#FF6B35">
                <path d="M12.017 0C9.389 3.108 8.5 6.5 9.5 9.5c.5 1.5 1.5 2.5 1 4C8 12 6.5 9.5 6.5 9.5 5.5 14 7 17 9 19c-1.5-.5-2.5-1.5-3-3C4.5 20 7 23 12 24c5 0 8-3 8-7 0-2.5-1.5-4.5-3-5.5.5 2-1 3.5-2 4C16.5 13 15 9 12.017 0z"/>
              </svg>
            </div>
          </div>

          <div class="card-meta">
            <p id="displayName" class="card-name"></p>
            <p id="displayHandle" class="card-handle"></p>
            <div class="stats-row">
              <span id="statRepos" class="stat-chip"></span>
              <span id="statFollowers" class="stat-chip"></span>
              <span id="statLocation" class="stat-chip hidden"></span>
            </div>
          </div>

          <span id="styleBadge" class="style-badge"></span>
        </div>

        <div class="card-divider"></div>

        <div class="roast-body">
          <div id="roastContent"></div>
        </div>

        <div class="action-bar">
          <button onclick="copyRoast()" class="action-btn">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            <span id="copyLabel">Copy</span>
          </button>

          <button onclick="generateAnotherRoast()" class="action-btn fire">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Another Roast
          </button>

          <a id="githubLink" href="#" target="_blank" rel="noopener noreferrer" class="action-btn">
            <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
            View Profile
          </a>
        </div>
      </div>

    </div>

    <!-- Examples -->
    <div class="examples">
      <p class="examples-label">// try a legend</p>
      <div class="examples-row">
        <button class="example-pill" onclick="tryExample('torvalds')">torvalds</button>
        <button class="example-pill" onclick="tryExample('gaearon')">gaearon</button>
        <button class="example-pill" onclick="tryExample('yyx990803')">yyx990803</button>
      </div>
    </div>

  </main>
  </div><!-- end content-wrap -->

  <!-- FOOTER -->
  <footer>
    <p class="footer-text">zero chill. maximum damage. 100% accurate.</p>
  </footer>

</div>

<script>
  let selectedStyle = 'savage';
  let currentRoast = '';
  let cachedProfileData = null;

  const $ = id => document.getElementById(id);
  const layout = $('layout');

  function loadingHTML(msg) {
    return `<div class="loading-wrap">
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <span class="loading-text">${msg}</span>
    </div>`;
  }

  function renderStream(text, el) {
    el.innerHTML = '';
    text.split('\n').forEach(line => {
      if (!line.trim()) {
        el.appendChild(document.createElement('br'));
      } else {
        const p = document.createElement('p');
        p.innerHTML = line
          .replace(/^#+\s*/, '')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        el.appendChild(p);
      }
    });
  }

  /* ── Style pills ── */
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedStyle = pill.dataset.style;
      if (cachedProfileData) generateAnotherRoast();
    });
  });

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRoast();
  });

  function tryExample(username) {
    $('username').value = username;
    handleRoast();
  }

  /* ── UI state ── */
  function showError(msg) {
    layout.classList.add('has-results');
    $('resultArea').classList.remove('hidden');
    $('skeleton').classList.add('hidden');
    $('roastCard').classList.add('hidden');
    $('errorCard').classList.remove('hidden');
    $('errorMsg').textContent = msg;
  }

  function showProfileCard(data) {
    cachedProfileData = data;
    layout.classList.add('has-results');
    $('resultArea').classList.remove('hidden');
    $('skeleton').classList.add('hidden');
    $('errorCard').classList.add('hidden');
    $('roastCard').classList.remove('hidden');

    const u = data.user;

    const av = $('avatar');
    av.style.animation = 'none';
    av.src = u.avatar_url;
    av.alt = u.login + ' avatar';
    requestAnimationFrame(() => { av.style.animation = ''; });

    $('displayName').textContent = u.name || u.login;
    $('displayHandle').textContent = '@' + u.login;
    $('statRepos').textContent = u.public_repos + ' repos';
    $('statFollowers').textContent = u.followers + ' followers';

    const loc = $('statLocation');
    if (u.location) { loc.textContent = u.location; loc.classList.remove('hidden'); }
    else { loc.classList.add('hidden'); }

    $('githubLink').href = 'https://github.com/' + u.login;

    const labels = { savage:'savage', pirate:'pirate', corporate:'corporate', haiku:'haiku', shakespearean:'shakespeare', albanian:'albanian' };
    $('styleBadge').textContent = labels[selectedStyle] || selectedStyle;

    $('roastContent').innerHTML = loadingHTML('Claude is cooking something brutal...');
    $('roastCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ── Stream helper ── */
  async function streamRoast(payload, contentEl) {
    const res = await fetch('/roast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      contentEl.innerHTML = '<p style="color:#F87171;font-size:.875rem;">Failed to generate roast. Try again.</p>';
      return null;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      renderStream(full, contentEl);
    }
    return full;
  }

  /* ── Main ── */
  async function handleRoast() {
    const username = $('username').value.trim();
    if (!username) {
      const inp = $('username');
      inp.focus();
      inp.style.borderColor = 'rgba(239,68,68,0.55)';
      inp.style.boxShadow = '0 0 0 4px rgba(239,68,68,0.1)';
      inp.classList.remove('shake');
      void inp.offsetWidth;
      inp.classList.add('shake');
      setTimeout(() => {
        inp.style.borderColor = '';
        inp.style.boxShadow = '';
        inp.classList.remove('shake');
      }, 900);
      return;
    }

    const btn = $('roastBtn');
    const btnText = $('btnText');
    btn.disabled = true;
    btn.classList.add('roasting');
    btnText.textContent = 'Fetching...';

    layout.classList.add('has-results');
    $('resultArea').classList.remove('hidden');
    $('skeleton').classList.remove('hidden');
    $('errorCard').classList.add('hidden');
    $('roastCard').classList.add('hidden');
    $('skeleton').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const pRes = await fetch('/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username }),
      });
      const pData = await pRes.json();

      if (!pRes.ok || pData.error) {
        showError(pData.error || 'Something went wrong.');
        return;
      }

      showProfileCard(pData);
      btnText.textContent = 'Roasting...';

      const labels = { savage:'savage', pirate:'pirate', corporate:'corporate', haiku:'haiku', shakespearean:'shakespeare', albanian:'albanian' };
      $('styleBadge').textContent = labels[selectedStyle] || selectedStyle;

      const full = await streamRoast({
        user: pData.user,
        repos: pData.repos,
        style: selectedStyle,
        albanian: selectedStyle === 'albanian',
      }, $('roastContent'));

      if (full) currentRoast = full;

    } catch {
      showError('Could not reach the server. Make sure the app is running and try again.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('roasting');
      btnText.textContent = "Roast 'em";
    }
  }

  /* ── Copy ── */
  async function copyRoast() {
    if (!currentRoast) return;
    try { await navigator.clipboard.writeText(currentRoast); }
    catch {
      const ta = document.createElement('textarea');
      ta.value = currentRoast;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const btn = $('copyLabel').closest('button');
    btn.classList.remove('copy-success');
    void btn.offsetWidth;
    btn.classList.add('copy-success');
    $('copyLabel').textContent = 'Copied!';
    setTimeout(() => { $('copyLabel').textContent = 'Copy'; btn.classList.remove('copy-success'); }, 2000);
  }

  /* ── Another roast ── */
  async function generateAnotherRoast() {
    if (!cachedProfileData) return;
    const el = $('roastContent');
    el.innerHTML = loadingHTML('Cooking another one...');

    const labels = { savage:'savage', pirate:'pirate', corporate:'corporate', haiku:'haiku', shakespearean:'shakespeare', albanian:'albanian' };
    $('styleBadge').textContent = labels[selectedStyle] || selectedStyle;

    const full = await streamRoast({
      user: cachedProfileData.user,
      repos: cachedProfileData.repos,
      style: selectedStyle,
      albanian: selectedStyle === 'albanian',
    }, el);

    if (full) currentRoast = full;
  }
</script>
</body>
</html>
