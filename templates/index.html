<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roast My GitHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['IBM Plex Sans', 'sans-serif'],
          },
          colors: {
            bg:      '#09090F',
            surface: '#111118',
            card:    '#16161F',
            border:  '#2A2A3A',
            fire:    '#FF6B35',
            ember:   '#FF4500',
            amber:   '#FFB347',
            bright:  '#F8FAFC',
            muted:   '#8B8BA7',
            subtle:  '#3A3A50',
          },
          keyframes: {
            fadeUp:  { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            fadeIn:  { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            pop:     { '0%': { transform: 'scale(0.7)', opacity: 0 }, '60%': { transform: 'scale(1.08)' }, '100%': { transform: 'scale(1)', opacity: 1 } },
            flameL:  { '0%,100%': { transform: 'rotate(-6deg) scaleY(1) scaleX(1)' }, '50%': { transform: 'rotate(4deg) scaleY(1.12) scaleX(0.95)' } },
            flameR:  { '0%,100%': { transform: 'rotate(4deg) scaleY(0.95)' }, '50%': { transform: 'rotate(-5deg) scaleY(1.08)' } },
            glow:    { '0%,100%': { opacity: 0.6 }, '50%': { opacity: 1 } },
            shimmer: { '0%': { backgroundPosition: '-600px 0' }, '100%': { backgroundPosition: '600px 0' } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            pulse3:  { '0%,100%': { transform: 'scale(1)', opacity: 0.8 }, '50%': { transform: 'scale(1.15)', opacity: 1 } },
          },
          animation: {
            fadeUp:  'fadeUp 0.5s cubic-bezier(.22,1,.36,1) forwards',
            fadeIn:  'fadeIn 0.4s ease forwards',
            pop:     'pop 0.45s cubic-bezier(.34,1.56,.64,1) forwards',
            flameL:  'flameL 1.4s ease-in-out infinite',
            flameR:  'flameR 1.1s ease-in-out infinite',
            glow:    'glow 2s ease-in-out infinite',
            shimmer: 'shimmer 1.6s linear infinite',
            slideUp: 'slideUp 0.4s ease forwards',
            pulse3:  'pulse3 2s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background-color: #09090F;
      color: #F8FAFC;
      min-height: 100vh;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* Radial gradient spotlight at top — pure CSS, no DOM element needed */

    /* Subtle grid pattern */
    .grid-bg {
      background-image:
        linear-gradient(rgba(42,42,58,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,42,58,0.4) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Shimmer for skeleton */
    .shimmer-bg {
      background: linear-gradient(90deg, #16161F 25%, #1E1E2E 50%, #16161F 75%);
      background-size: 600px 100%;
      animation: shimmer 1.6s linear infinite;
    }

    /* Roast text — visible by default, JS adds fade-in class */
    .roast-text p {
      opacity: 1;
      transform: none;
    }
    .roast-text p.animate-in {
      animation: slideUp 0.4s cubic-bezier(.22,1,.36,1) both;
    }

    /* Fire glow on accent elements */
    .fire-glow {
      box-shadow: 0 0 24px rgba(255,107,53,0.45), 0 0 48px rgba(255,69,0,0.2);
    }
    .fire-glow:hover {
      box-shadow: 0 0 32px rgba(255,107,53,0.65), 0 0 64px rgba(255,69,0,0.3);
    }

    /* Input ring on focus */
    #username:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(255,107,53,0.5), 0 0 16px rgba(255,107,53,0.15);
    }

    /* Style pill */
    .style-pill {
      transition: all 0.18s ease;
      border: 1.5px solid #2A2A3A;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
    }
    .style-pill.active {
      border-color: #FF6B35;
      background: rgba(255,107,53,0.12);
      color: #FF6B35;
    }
    .style-pill:hover:not(.active) {
      border-color: #3A3A50;
      color: #F8FAFC;
      background: rgba(255,255,255,0.04);
    }

    /* Stat chip */
    .stat-chip {
      background: rgba(255,107,53,0.08);
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: #FFB347;
    }

    /* Result card entrance */
    #roastCard { animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) forwards; }

    /* Scroll smooth */
    html { scroll-behavior: smooth; }

    /* Keyframes that are only referenced in <style>, not as animate-* classes */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position:  600px 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="fixed inset-0 grid-bg opacity-50 pointer-events-none z-0"></div>
  <!-- fire glow behind header -->
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] pointer-events-none z-0" style="background: radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.13) 0%, transparent 70%);"></div>

  <div class="relative z-10 min-h-screen flex flex-col items-center w-full">

    <!-- ── HEADER ── -->
    <header class="pt-14 pb-6 px-4 w-full max-w-lg mx-auto">
      <div class="flex flex-col items-center text-center gap-3">
        <h1 class="font-mono font-bold text-4xl md:text-5xl leading-none tracking-tight">
          Roast My <span style="background: linear-gradient(135deg, #FF6B35, #FFB347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">GitHub</span>
        </h1>
        <p class="text-muted text-sm leading-relaxed">
          Drop a username. Get publicly humiliated.<br/>
          <span style="color: rgba(255,107,53,0.6); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;">// powered by Claude AI · no mercy included</span>
        </p>
      </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="w-full max-w-lg px-4 pb-20 flex flex-col gap-4">

      <!-- Input card -->
      <div class="bg-card rounded-2xl border border-border p-6 shadow-2xl">

        <!-- Username -->
        <div class="mb-5">
          <label for="username" class="block font-mono text-xs text-muted/70 mb-2 tracking-widest uppercase">GitHub Username</label>
          <div class="flex gap-2.5">
            <div class="relative flex-1">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 font-mono text-muted/50 text-sm select-none">@</span>
              <input
                id="username"
                type="text"
                placeholder="torvalds"
                autocomplete="off"
                spellcheck="false"
                class="w-full bg-surface border border-border rounded-xl pl-8 pr-4 py-3 text-bright text-sm font-mono placeholder-muted/30 transition-all duration-200"
              />
            </div>
            <button
              id="roastBtn"
              onclick="handleRoast()"
              class="fire-glow bg-fire hover:bg-ember text-white font-bold font-sans px-5 py-3 rounded-xl text-sm transition-all duration-200 cursor-pointer whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none flex items-center gap-2"
            >
              <!-- Fire icon -->
              <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.017 0C9.389 3.108 8.5 6.5 9.5 9.5c.5 1.5 1.5 2.5 1 4C8 12 6.5 9.5 6.5 9.5 5.5 14 7 17 9 19c-1.5-.5-2.5-1.5-3-3C4.5 20 7 23 12 24c5 0 8-3 8-7 0-2.5-1.5-4.5-3-5.5.5 2-1 3.5-2 4C16.5 13 15 9 12.017 0z"/>
              </svg>
              <span id="btnText">Roast 'em</span>
            </button>
          </div>
        </div>

        <!-- Roast style -->
        <div>
          <p class="font-mono text-xs text-muted/70 uppercase tracking-widest mb-2.5">Roast Style</p>
          <div class="flex flex-wrap gap-2" id="stylePills">
            <button class="style-pill active text-fire px-3.5 py-1.5 rounded-full cursor-pointer" data-style="savage">Savage</button>
            <button class="style-pill text-muted px-3.5 py-1.5 rounded-full cursor-pointer" data-style="pirate">Pirate</button>
            <button class="style-pill text-muted px-3.5 py-1.5 rounded-full cursor-pointer" data-style="corporate">Corporate</button>
            <button class="style-pill text-muted px-3.5 py-1.5 rounded-full cursor-pointer" data-style="haiku">Haiku</button>
            <button class="style-pill text-muted px-3.5 py-1.5 rounded-full cursor-pointer" data-style="shakespearean">Shakespeare</button>
          </div>
        </div>
      </div>

      <!-- Result area -->
      <div id="resultArea" class="hidden flex flex-col gap-4">

        <!-- Skeleton -->
        <div id="skeleton" class="hidden bg-card rounded-2xl border border-border p-6">
          <div class="flex items-center gap-4 mb-5">
            <div class="w-14 h-14 rounded-full shimmer-bg flex-shrink-0"></div>
            <div class="flex-1 space-y-2.5">
              <div class="h-4 shimmer-bg rounded-lg w-36"></div>
              <div class="h-3 shimmer-bg rounded-lg w-24"></div>
            </div>
          </div>
          <div class="space-y-2.5">
            <div class="h-3 shimmer-bg rounded-lg w-full"></div>
            <div class="h-3 shimmer-bg rounded-lg w-11/12"></div>
            <div class="h-3 shimmer-bg rounded-lg w-4/5"></div>
            <div class="h-3 shimmer-bg rounded-lg w-full"></div>
            <div class="h-3 shimmer-bg rounded-lg w-3/4"></div>
            <div class="h-3 shimmer-bg rounded-lg w-5/6"></div>
          </div>
        </div>

        <!-- Error -->
        <div id="errorCard" class="hidden bg-card rounded-2xl border border-red-900/50 p-5">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
            <p id="errorMsg" class="text-red-400 text-sm leading-relaxed font-sans"></p>
          </div>
        </div>

        <!-- Roast result -->
        <div id="roastCard" class="hidden bg-card rounded-2xl border border-border overflow-hidden">

          <!-- User header with fire accent bar -->
          <div class="h-0.5 w-full" style="background: linear-gradient(90deg, #FF4500, #FF6B35, #FFB347, transparent)"></div>

          <div class="p-5 pb-4">
            <div class="flex items-start gap-4">
              <div class="relative flex-shrink-0">
                <img id="avatar" src="" alt="GitHub avatar" class="w-14 h-14 rounded-xl border border-border object-cover animate-pop" />
                <!-- Online-style fire dot -->
                <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-bg rounded-full flex items-center justify-center">
                  <svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="currentColor" style="color:#FF6B35">
                    <path d="M12.017 0C9.389 3.108 8.5 6.5 9.5 9.5c.5 1.5 1.5 2.5 1 4C8 12 6.5 9.5 6.5 9.5 5.5 14 7 17 9 19c-1.5-.5-2.5-1.5-3-3C4.5 20 7 23 12 24c5 0 8-3 8-7 0-2.5-1.5-4.5-3-5.5.5 2-1 3.5-2 4C16.5 13 15 9 12.017 0z"/>
                  </svg>
                </div>
              </div>

              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <h2 id="displayName" class="font-bold text-bright text-base leading-tight"></h2>
                  <span id="albanianBadge" class="hidden font-mono text-xs bg-fire/10 text-fire border border-fire/25 px-2 py-0.5 rounded-full">AL</span>
                </div>
                <p id="displayHandle" class="font-mono text-muted text-xs mb-2.5"></p>
                <div class="flex gap-2 flex-wrap">
                  <span id="statRepos" class="stat-chip"></span>
                  <span id="statFollowers" class="stat-chip"></span>
                  <span id="statLocation" class="hidden stat-chip"></span>
                </div>
              </div>

              <!-- Style badge top right -->
              <span id="styleBadge" class="flex-shrink-0 font-mono text-xs text-muted/60 bg-surface border border-border px-2.5 py-1 rounded-lg"></span>
            </div>
          </div>

          <!-- Divider -->
          <div class="mx-5 border-t border-border/60"></div>

          <!-- Roast text -->
          <div class="p-5">
            <div id="roastContent" class="roast-text text-bright/85 text-sm leading-relaxed space-y-3 font-sans"></div>
          </div>

          <!-- Actions -->
          <div class="px-5 pb-5 flex gap-2.5 flex-wrap">
            <button onclick="copyRoast()" class="flex items-center gap-2 font-mono text-xs text-muted border border-border hover:border-subtle hover:text-bright px-4 py-2 rounded-xl transition-all duration-200 cursor-pointer">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
              </svg>
              <span id="copyLabel">Copy</span>
            </button>

            <button onclick="roastAnother()" class="flex items-center gap-2 font-mono text-xs text-fire border border-fire/30 hover:border-fire hover:bg-fire/8 px-4 py-2 rounded-xl transition-all duration-200 cursor-pointer">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Roast Another
            </button>

            <a id="githubLink" href="#" target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-2 font-mono text-xs text-muted border border-border hover:border-subtle hover:text-bright px-4 py-2 rounded-xl transition-all duration-200 cursor-pointer">
              <svg class="w-3.5 h-3.5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
              </svg>
              View Profile
            </a>
          </div>
        </div>

      </div>

      <!-- Example users -->
      <div id="examples" class="text-center pt-2">
        <p class="font-mono text-xs text-muted/40 mb-2.5">// try a legend</p>
        <div class="flex flex-wrap gap-2 justify-center">
          <button onclick="tryExample('torvalds')" class="font-mono text-xs text-muted/60 border border-border hover:border-subtle hover:text-bright px-3.5 py-1.5 rounded-full transition-all duration-200 cursor-pointer">torvalds</button>
          <button onclick="tryExample('gaearon')" class="font-mono text-xs text-muted/60 border border-border hover:border-subtle hover:text-bright px-3.5 py-1.5 rounded-full transition-all duration-200 cursor-pointer">gaearon</button>
          <button onclick="tryExample('yyx990803')" class="font-mono text-xs text-muted/60 border border-border hover:border-subtle hover:text-bright px-3.5 py-1.5 rounded-full transition-all duration-200 cursor-pointer">yyx990803</button>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="w-full max-w-lg mx-auto px-4 pb-10 pt-6 mt-4 border-t border-border/30">
      <div class="flex items-center justify-between">
        <span class="font-mono text-xs" style="color: rgba(255,107,53,0.5);">Roast My GitHub</span>
        <span class="font-mono text-xs text-muted/30">© 2025</span>
        <a href="https://github.com" target="_blank" rel="noopener noreferrer"
           class="font-mono text-xs text-muted/30 hover:text-muted/60 transition-colors duration-200 cursor-pointer">
          View Source
        </a>
      </div>
    </footer>

  </div>

  <script>
    let selectedStyle = 'savage';
    let currentRoast = '';
    let cachedProfileData = null;

    document.querySelectorAll('.style-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.style-pill').forEach(p => {
          p.classList.remove('active', 'text-fire');
          p.classList.add('text-muted');
        });
        pill.classList.add('active', 'text-fire');
        pill.classList.remove('text-muted');
        selectedStyle = pill.dataset.style;
      });
    });

    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleRoast();
    });

    function tryExample(username) {
      document.getElementById('username').value = username;
      handleRoast();
    }

    function showError(msg) {
      document.getElementById('resultArea').classList.remove('hidden');
      document.getElementById('skeleton').classList.add('hidden');
      document.getElementById('roastCard').classList.add('hidden');
      document.getElementById('errorCard').classList.remove('hidden');
      document.getElementById('errorMsg').textContent = msg;
    }

    function showProfileCard(data) {
      cachedProfileData = data;
      document.getElementById('resultArea').classList.remove('hidden');
      document.getElementById('skeleton').classList.add('hidden');
      document.getElementById('errorCard').classList.add('hidden');
      document.getElementById('roastCard').classList.remove('hidden');

      const u = data.user;
      document.getElementById('avatar').src = u.avatar_url;
      document.getElementById('avatar').alt = u.login + ' avatar';
      document.getElementById('displayName').textContent = u.name || u.login;
      document.getElementById('displayHandle').textContent = '@' + u.login;
      document.getElementById('statRepos').textContent = u.public_repos + ' repos';
      document.getElementById('statFollowers').textContent = u.followers + ' followers';

      const locEl = document.getElementById('statLocation');
      if (u.location) { locEl.textContent = u.location; locEl.classList.remove('hidden'); }
      else { locEl.classList.add('hidden'); }

      document.getElementById('albanianBadge').classList.toggle('hidden', !data.albanian);
      document.getElementById('githubLink').href = 'https://github.com/' + u.login;

      const labels = { savage:'savage', pirate:'pirate', corporate:'corporate', haiku:'haiku', shakespearean:'shakespeare' };
      document.getElementById('styleBadge').textContent = labels[selectedStyle] || selectedStyle;

      // Show roast loading state
      const content = document.getElementById('roastContent');
      content.innerHTML = `
        <div class="flex items-center gap-3 py-4">
          <div class="flex gap-1">
            <span class="w-2 h-2 rounded-full bg-fire animate-bounce" style="animation-delay:0s"></span>
            <span class="w-2 h-2 rounded-full bg-fire animate-bounce" style="animation-delay:0.15s"></span>
            <span class="w-2 h-2 rounded-full bg-fire animate-bounce" style="animation-delay:0.3s"></span>
          </div>
          <span class="text-muted text-xs font-mono">Claude is cooking something brutal...</span>
        </div>`;

      document.getElementById('roastCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showRoastText(roastText, style) {
      currentRoast = roastText;
      const labels = { savage:'savage', pirate:'pirate', corporate:'corporate', haiku:'haiku', shakespearean:'shakespeare' };
      document.getElementById('styleBadge').textContent = labels[style] || style;

      const content = document.getElementById('roastContent');
      content.innerHTML = '';

      // Strip markdown bold/headers for cleaner display, render line by line
      const lines = roastText.split('\n').filter(l => l.trim());
      lines.forEach((line, i) => {
        const p = document.createElement('p');
        // Convert **bold** to <strong> and strip # headers
        const cleaned = line
          .replace(/^#+\s*/, '')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        p.innerHTML = cleaned;
        p.className = 'animate-in';
        p.style.animationDelay = (i * 0.07) + 's';
        p.style.opacity = '0';
        content.appendChild(p);
        // Force reflow then set opacity via animation
        requestAnimationFrame(() => { p.style.opacity = ''; });
      });
    }

    async function handleRoast() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        const inp = document.getElementById('username');
        inp.focus();
        inp.style.borderColor = '#FF4500';
        setTimeout(() => { inp.style.borderColor = ''; }, 1000);
        return;
      }

      const btn = document.getElementById('roastBtn');
      const btnText = document.getElementById('btnText');
      btn.disabled = true;
      btnText.textContent = 'Fetching...';

      // Show full-card skeleton while fetching profile
      document.getElementById('resultArea').classList.remove('hidden');
      document.getElementById('skeleton').classList.remove('hidden');
      document.getElementById('errorCard').classList.add('hidden');
      document.getElementById('roastCard').classList.add('hidden');
      document.getElementById('skeleton').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        // Step 1: fetch profile fast
        const profileRes = await fetch('/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });
        const profileData = await profileRes.json();

        if (!profileRes.ok || profileData.error) {
          showError(profileData.error || 'Something went wrong.');
          return;
        }

        // Show profile immediately
        showProfileCard(profileData);
        btnText.textContent = 'Roasting...';

        // Step 2: generate roast (slow, Claude)
        const roastRes = await fetch('/roast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: profileData.user,
            repos: profileData.repos,
            style: selectedStyle,
            albanian: profileData.albanian,
          }),
        });
        const roastData = await roastRes.json();

        if (!roastRes.ok || roastData.error) {
          document.getElementById('roastContent').innerHTML =
            `<p class="text-red-400 text-sm">${roastData.error || 'Failed to generate roast.'}</p>`;
        } else {
          showRoastText(roastData.roast, roastData.style);
        }

      } catch {
        showError('Could not reach the server. Make sure the app is running and try again.');
      } finally {
        btn.disabled = false;
        btnText.textContent = "Roast 'em";
      }
    }

    async function copyRoast() {
      if (!currentRoast) return;
      try { await navigator.clipboard.writeText(currentRoast); }
      catch {
        const ta = document.createElement('textarea');
        ta.value = currentRoast;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const label = document.getElementById('copyLabel');
      label.textContent = 'Copied!';
      setTimeout(() => { label.textContent = 'Copy'; }, 2000);
    }

    function roastAnother() {
      document.getElementById('username').value = '';
      document.getElementById('resultArea').classList.add('hidden');
      cachedProfileData = null;
      document.getElementById('username').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
